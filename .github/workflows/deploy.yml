name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull do repositório
        run: |
          cd /home/devmuca/deploy/portfolio
          git pull origin main

      - name: Instalar dependências
        run: |
          cd /home/devmuca/deploy/portfolio
          npm ci

      - name: Build
        run: |
          cd /home/devmuca/deploy/portfolio
          npm run build

      - name: Reiniciar PM2
        run: pm2 restart portfolio
